<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nobztech - Invoice Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-gray-100 p-10">

<div class="max-w-5xl mx-auto bg-white p-8 shadow-xl rounded-xl">

<!-- HEADER -->

<div class="flex justify-between items-center border-b pb-6">

<div class="flex items-center gap-4">

<img src="logo.png" class="w-16">

<div>
<h1 class="text-2xl font-bold">Nobztech</h1>
<p class="text-sm text-gray-500">Gauteng, South Africa</p>
<p class="text-sm text-gray-500">Email: hlongz920@gmail.com</p>
</div>

</div>

<div class="text-right">
<h2 class="text-3xl font-bold">INVOICE</h2>
<p id="invoiceNumber"></p>
<p id="invoiceDate"></p>
</div>

</div>


<!-- CLIENT DETAILS -->

<div class="grid grid-cols-2 gap-6 mt-8">

<div>
<h3 class="font-semibold mb-2">Bill To</h3>

<input id="clientName" placeholder="Client Name"
class="input">

<input id="clientCompany" placeholder="Company"
class="input">

<input id="clientEmail" placeholder="Email"
class="input">

</div>

<div>

<h3 class="font-semibold mb-2">Invoice Details</h3>

<label>Discount (%)</label>
<input id="discount" type="number" class="input" value="0">

<label>VAT (%)</label>
<input id="vat" type="number" class="input" value="15">

</div>

</div>


<!-- PRODUCTS -->

<table class="w-full mt-8 text-left border">

<thead class="bg-gray-100">
<tr>
<th class="p-2">Item</th>
<th>Qty</th>
<th>Price (R)</th>
<th>Total</th>
<th></th>
</tr>
</thead>

<tbody id="items"></tbody>

</table>


<button onclick="addItem()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">
Add Item
</button>


<!-- TOTALS -->

<div class="mt-8 text-right">

<p>Subtotal: <span id="subtotal">R0</span></p>

<p>Discount: <span id="discountTotal">R0</span></p>

<p>VAT: <span id="vatTotal">R0</span></p>

<h2 class="text-2xl font-bold">
Total: <span id="grandTotal">R0</span>
</h2>

</div>


<!-- ACTIONS -->

<div class="flex gap-4 mt-8">

<button onclick="calculate()" class="btn">
Calculate
</button>

<button onclick="window.print()" class="btn">
Print / Save PDF
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
